name: kumavpn-admin

services:
  web:
    build: ./web
    image: kumavpn/web:latest
    container_name: kumavpn-web
    restart: unless-stopped
    environment:
      KUMAVPN_BASE_PATH: /opt/kumavpn
      ADMIN_USER: ${ADMIN_USER:?set ADMIN_USER in .env}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?set ADMIN_PASSWORD_HASH in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      PUBLIC_IP: ${PUBLIC_IP:-}
      VPN_PORT_BASE: ${VPN_PORT_BASE:-1193}
      KUMA_PORT_BASE: ${KUMA_PORT_BASE:-3000}
      VPN_SUBNET_PREFIX: ${VPN_SUBNET_PREFIX:-100.64}
      DOCKER_SUBNET_PREFIX: ${DOCKER_SUBNET_PREFIX:-172.30}
      SECURE_COOKIES: ${SECURE_COOKIES:-0}
      KUMA_BIND: ${KUMA_BIND:-0.0.0.0}
    ports:
      # ADMIN_BIND configurable; dev default 127.0.0.1 (usar 0.0.0.0 para acceso directo).
      - "${ADMIN_BIND:-127.0.0.1}:${ADMIN_PORT:-8000}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/kumavpn:/opt/kumavpn

  # Reverse proxy + TLS automático (Let's Encrypt) para el dominio del panel y los
  # subdominios de cada tenant (Uptime Kuma). El panel escribe el Caddyfile en
  # /opt/kumavpn/caddy/Caddyfile (caddy_service.py) y hace `caddy reload` acá. Sin
  # dominios configurados el Caddyfile queda vacío y Caddy corre idle (no afecta el
  # acceso por IP:puerto). Resuelve `kumavpn-web` por la red del compose y los Kuma
  # de cada tenant por host.docker.internal (puertos publicados en el host).
  caddy:
    image: caddy:2-alpine
    container_name: caddy-monitormaat
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/kumavpn/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      # Certs wildcard emitidos por certbot (modo "SSL por API" en Red y dominios).
      # Read-only: el Caddyfile los referencia como /certs/live/<dominio>/*.pem
      - /opt/kumavpn/letsencrypt:/certs:ro

volumes:
  caddy_data:
  caddy_config:
