{% extends "base.html" %}
{% block title %}Usuarios · MonitorMaat Admin{% endblock %}
{% block content %}
<link rel="preload" href="/api/users{% if q %}?q={{ q|urlencode }}{% endif %}" as="fetch" crossorigin="use-credentials">

<div id="users-app" data-initial-q="{{ q or '' }}" v-cloak>
  <div class="row between">
    <h1>Usuarios</h1>
    <a class="btn primary" href="/users/new">+ Nuevo usuario</a>
  </div>

  <form class="search-bar" @submit.prevent="onSearch">
    <input type="text" v-model="q" placeholder="Buscar por usuario, nombre, apellido, empresa o email…">
    <button type="submit" class="btn">Buscar</button>
    <a v-if="q" class="btn small" href="#" @click.prevent="clearSearch">Limpiar</a>
  </form>

  <p v-if="!loading && q && users.length === 0" class="muted">
    No se encontraron usuarios que coincidan con "<span v-text="q"></span>".
  </p>

  <div v-if="loading" class="tbl-wrap desktop-only">
    <table class="tbl">
      <thead>
        <tr>
          <th>Usuario</th><th>Nombre</th><th>Empresa</th><th>Contacto</th>
          <th>Rol</th><th>Plan</th><th>Tenants</th><th>Quota</th><th>Creado</th><th></th>
        </tr>
      </thead>
      <tbody>
        <tr v-for="n in 4" :key="n">
          <td v-for="c in 10" :key="c"><span class="sk-inline" style="min-width:5em"></span></td>
        </tr>
      </tbody>
    </table>
  </div>

  <template v-if="!loading && users.length > 0">
    <div class="desktop-only tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th>Usuario</th><th>Nombre</th><th>Empresa</th><th>Contacto</th>
            <th>Rol</th><th>Plan</th><th>Tenants</th><th>Quota</th><th>Creado</th><th></th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="u in users" :key="u.id" :class="{ 'row-inactive': !u.is_active }">
            <td>
              <strong v-text="u.username"></strong>
              <span v-if="!u.is_active" class="role-pill role-system" style="margin-left:6px">desactivado</span>
            </td>
            <td v-text="fullName(u) || '—'"></td>
            <td v-text="u.company_name || '—'"></td>
            <td>
              <template v-if="u.email || u.phone">
                <div v-if="u.email" class="small"><a :href="'mailto:' + u.email" v-text="u.email"></a></div>
                <div v-if="u.phone" class="small muted" v-text="u.phone"></div>
              </template>
              <template v-else>—</template>
            </td>
            <td><span class="role-pill" :class="'role-' + u.role" v-text="u.role"></span></td>
            <td>
              <template v-if="u.role === 'admin'"><span class="muted small">N/A</span></template>
              <template v-else-if="u.assigned_plan">
                <strong v-text="u.assigned_plan.name"></strong>
                <div class="muted small" v-text="u.assigned_plan.price.toFixed(2) + ' ' + u.assigned_plan.currency + ' / ' + u.assigned_plan.days + 'd'"></div>
              </template>
              <template v-else>
                <span class="muted small" style="color:#f59e0b">sin plan</span>
              </template>
            </td>
            <td v-text="u.tenant_count"></td>
            <td>
              <span v-if="u.role === 'admin'" class="muted">∞</span>
              <span v-else-if="u.tenant_quota" v-text="u.tenant_quota"></span>
              <span v-else class="muted">0</span>
            </td>
            <td class="muted small" v-text="formatDate(u.created_at)"></td>
            <td>
              <div class="row" style="gap:8px;flex-wrap:nowrap;justify-content:flex-end">
                <a class="btn small" :href="'/users/' + u.id + '/edit'">Editar</a>
                <form :action="'/users/' + u.id + '/toggle-active'" method="post" class="inline"
                      @submit="confirmToggle($event, u)">
                  <button type="submit" class="btn small"
                          :class="u.is_active ? 'btn-warn-soft' : 'btn-ok-soft'"
                          v-text="u.is_active ? 'Desactivar' : 'Activar'"></button>
                </form>
                <form :action="'/users/' + u.id + '/delete'" method="post" class="inline"
                      @submit="confirmDelete($event, u.username)">
                  <button class="btn small warn">Borrar</button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="mobile-only user-list-cards">
      <article v-for="u in users" :key="u.id" class="user-card" :class="{ 'row-inactive': !u.is_active }">
        <div class="user-card-head">
          <div>
            <code class="user-name" v-text="u.username"></code>
            <span v-if="!u.is_active" class="role-pill role-system" style="margin-left:6px">desactivado</span>
          </div>
          <span class="role-pill" :class="'role-' + u.role" v-text="u.role"></span>
        </div>
        <dl class="user-card-grid">
          <template v-if="fullName(u)">
            <dt>Nombre</dt><dd v-text="fullName(u)"></dd>
          </template>
          <dt>Empresa</dt><dd v-text="u.company_name || '—'"></dd>
          <template v-if="u.email">
            <dt>Email</dt><dd><a :href="'mailto:' + u.email" v-text="u.email"></a></dd>
          </template>
          <template v-if="u.phone">
            <dt>Tel</dt><dd v-text="u.phone"></dd>
          </template>
          <dt>Tenants</dt>
          <dd>
            <span v-text="u.tenant_count"></span>
            <span v-if="u.role !== 'admin'"> / <span v-text="u.tenant_quota || 0"></span></span>
          </dd>
          <template v-if="u.role !== 'admin'">
            <dt>Plan</dt>
            <dd>
              <template v-if="u.assigned_plan">
                <strong v-text="u.assigned_plan.name"></strong>
                <div class="muted small" v-text="u.assigned_plan.price.toFixed(2) + ' ' + u.assigned_plan.currency + ' / ' + u.assigned_plan.days + 'd'"></div>
              </template>
              <template v-else>
                <span class="muted" style="color:#f59e0b">sin plan asignado</span>
              </template>
            </dd>
          </template>
        </dl>
        <div class="row" style="gap:10px;margin-top:10px">
          <a class="btn primary" :href="'/users/' + u.id + '/edit'">Editar</a>
          <form :action="'/users/' + u.id + '/toggle-active'" method="post" class="inline"
                @submit="confirmToggle($event, u)">
            <button type="submit" class="btn"
                    :class="u.is_active ? 'btn-warn-soft' : 'btn-ok-soft'"
                    v-text="u.is_active ? 'Desactivar' : 'Activar'"></button>
          </form>
          <form :action="'/users/' + u.id + '/delete'" method="post" class="inline"
                @submit="confirmDelete($event, u.username)">
            <button class="btn warn">Borrar</button>
          </form>
        </div>
      </article>
    </div>
  </template>

  <p v-if="!loading && !q && users.length === 0" class="muted">No hay usuarios todavía.</p>
</div>

<script src="/static/vue.global.prod.js" defer></script>
<script defer>
window.addEventListener('DOMContentLoaded', () => {
  const root = document.getElementById('users-app');
  const initialQ = root.dataset.initialQ || '';
  const TZ = 'America/Guayaquil';
  const dateFmt = new Intl.DateTimeFormat('sv-SE', {
    timeZone: TZ, year: 'numeric', month: '2-digit', day: '2-digit',
  });

  const { createApp, ref, onMounted, onBeforeUnmount } = Vue;

  createApp({
    setup() {
      const loading = ref(true);
      const q = ref(initialQ);
      const users = ref([]);

      let inflight = null;

      async function fetchData() {
        if (inflight) inflight.abort();
        inflight = new AbortController();
        const url = '/api/users' + (q.value ? '?q=' + encodeURIComponent(q.value) : '');
        try {
          const r = await fetch(url, { credentials: 'same-origin', signal: inflight.signal });
          if (!r.ok) return;
          const d = await r.json();
          users.value = d.users;
          loading.value = false;
        } catch (e) {
          if (e.name === 'AbortError') return;
        } finally {
          inflight = null;
        }
      }

      function syncUrl() {
        const url = new URL(window.location.href);
        if (q.value) url.searchParams.set('q', q.value);
        else url.searchParams.delete('q');
        window.history.replaceState({}, '', url);
      }

      function onSearch() { loading.value = true; syncUrl(); fetchData(); }
      function clearSearch() { q.value = ''; onSearch(); }

      function fullName(u) {
        return ((u.first_name || '') + ' ' + (u.last_name || '')).trim();
      }
      function formatDate(ts) {
        if (!ts) return '—';
        const d = new Date(ts);
        if (isNaN(d.getTime())) return ts.slice(0, 10);
        return dateFmt.format(d);
      }
      function confirmDelete(ev, username) {}
      function confirmToggle(ev, u) {}

      onMounted(fetchData);
      onBeforeUnmount(() => { if (inflight) inflight.abort(); });

      return { loading, q, users, onSearch, clearSearch, fullName, formatDate, confirmDelete, confirmToggle };
    },
    delimiters: ['[[', ']]'],
  }).mount('#users-app');
});
</script>

<style>
  [v-cloak] { visibility: hidden; }

  /* Filas desactivadas: opacas para identificar visualmente */
  .row-inactive { opacity: .55; }
  .row-inactive:hover { opacity: 1; }

  /* Botones soft: amarillo para desactivar, verde para activar (menos
     agresivos que warn rojo, no se confunden con "Borrar") */
  .btn-warn-soft {
    background: #f5b454 !important;
    color: #1f1408 !important;
    border-color: #d8901c !important;
    font-weight: 600;
  }
  .btn-warn-soft:hover {
    background: #d8901c !important;
    color: #fff !important;
  }
  .btn-ok-soft {
    background: #34c780 !important;
    color: #062817 !important;
    border-color: #1d9c5d !important;
    font-weight: 600;
  }
  .btn-ok-soft:hover {
    background: #1d9c5d !important;
    color: #fff !important;
  }
  .sk-inline {
    display: inline-block;
    min-height: 1em;
    background: linear-gradient(90deg, var(--sk-base, rgba(255,255,255,0.07)) 25%, var(--sk-hi, rgba(255,255,255,0.14)) 50%, var(--sk-base, rgba(255,255,255,0.07)) 75%);
    background-size: 200% 100%;
    animation: sk-shimmer 1.2s ease-in-out infinite;
    border-radius: 6px;
    color: transparent;
  }
  html.theme-light .sk-inline { --sk-base: rgba(0,0,0,0.06); --sk-hi: rgba(0,0,0,0.12); }
  @keyframes sk-shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
{% endblock %}
