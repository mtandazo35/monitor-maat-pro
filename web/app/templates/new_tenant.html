{% extends "base.html" %}
{% block title %}Nuevo tenant · MonitorMaat Admin{% endblock %}
{% block content %}
<section id="new-tenant-app" class="card card-narrow" v-cloak>
  <h1>Nuevo tenant</h1>
  <p class="muted">
    Asigna automáticamente puerto VPN, puerto Kuma y rangos IP. Levanta los contenedores al terminar.
  </p>
  <form method="post" action="/tenants/new" @submit="onSubmit">
    <label>Nombre (solo minúsculas, números y guiones)
      <input name="name" v-model="name" pattern="[a-z][a-z0-9-]{1,30}" required autofocus placeholder="maat">
      <small v-if="name && !valid" class="muted" style="color: var(--danger, #ef4444)">
        Debe arrancar con letra minúscula. Permitido: a-z, 0-9, guion. 2-31 chars.
      </small>
    </label>
    <label>Versión de Uptime Kuma
      <select name="kuma_tag">
        <option value="1" {% if kuma_default == '1' %}selected{% endif %}>1 · 1.x estable (recomendada)</option>
        <option value="2" {% if kuma_default == '2' %}selected{% endif %}>2 · 2.x (2.4.0, última)</option>
      </select>
      <small class="muted">
        Podés cambiarla después por-tenant (subir o bajar). La 2.x migra la base al primer
        arranque; bajar a 1.x luego requiere el respaldo automático.
      </small>
    </label>
    <div class="row">
      <button type="submit" class="primary" :disabled="!valid">Crear</button>
      <a href="/" class="btn">Cancelar</a>
    </div>
  </form>
</section>

<script src="/static/vue.global.prod.js" defer></script>
<script defer>
window.addEventListener('DOMContentLoaded', () => {
  const { createApp, ref, computed } = Vue;
  createApp({
    setup() {
      const name = ref('');
      const valid = computed(() => /^[a-z][a-z0-9-]{1,30}$/.test(name.value));
      function onSubmit(ev) { if (!valid.value) ev.preventDefault(); }
      return { name, valid, onSubmit };
    },
    delimiters: ['[[', ']]'],
  }).mount('#new-tenant-app');
});
</script>

<style>[v-cloak] { visibility: hidden; }</style>
{% endblock %}
