{# Reusable macros #}

{% macro pwd_field(id, name, value='', placeholder='', required=False, autocomplete='current-password', minlength=0, autofocus=False) -%}
<span class="pwd-wrap">
  <input type="password" id="{{ id }}" name="{{ name }}"
         {% if value %}value="{{ value }}"{% endif %}
         {% if required %}required{% endif %}
         {% if minlength %}minlength="{{ minlength }}"{% endif %}
         {% if autofocus %}autofocus{% endif %}
         autocomplete="{{ autocomplete }}"
         {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}>
  <button type="button" class="pwd-toggle" onclick="MM.togglePwd('{{ id }}', this)" aria-label="Mostrar contraseña" tabindex="-1">
    <svg class="ic-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
    <svg class="ic-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
  </button>
</span>
{%- endmacro %}
